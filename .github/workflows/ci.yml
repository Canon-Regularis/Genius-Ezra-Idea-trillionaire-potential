name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, type-check & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint + import order)
        run: ruff check .

      - name: Mypy (type-check)
        run: mypy

      - name: Pytest
        run: pytest -q

  build:
    name: Build .ankiaddon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the distributable add-on
        run: python build.py

      - name: Upload the .ankiaddon artifact
        uses: actions/upload-artifact@v4
        with:
          name: randomized_occlusion-ankiaddon
          path: dist/randomized_occlusion.ankiaddon
          if-no-files-found: error
